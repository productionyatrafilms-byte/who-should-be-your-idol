<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/page.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <style>
      .page-title {
        position: absolute;
        top: 1.5vw !important;
        left: 50%;
        width: 35%;
        text-align: center;
        z-index: 10000;
        transform: translateX(-50%);
        background-color: rgba(245, 40, 146, 48%);
        backdrop-filter: blur(1vw);
        -webkit-backdrop-filter: blur(1vw);
        padding: 0.5vw 0;
        border: 0.4vw solid #f6cb99;
        border-radius: 10vw;
      }

      .page-title span {
        font-size: 2.5vw;
        color: white;
        font-family: "OleoScript";
        display: block;
        font-weight: bolder !important;
        position: relative;
        text-shadow: 0.2vw 0.2vw 0.1vw rgba(0, 0, 0, 0.76);
        z-index: 1;
      }

      .main {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .video-container {
        position: absolute;
        top: 47%;
        left: 50%;
        width: 35vw;
        height: 26vw;
        transform: translate(-50%, -50%);
        z-index: 5;
      }

      .dots{
        position: absolute;
        width: 22%;
        display: block;
        object-fit: contain;
        top: 20vw;
        left: 29vw;
        z-index: 1000;
      }
      .video-border-layer,
      .video-mask-layer {
        position: absolute;
        inset: 0;

        -webkit-mask-image: url("./assets/images/title.png");
        mask-image: url("./assets/images/title.png");

        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;

        -webkit-mask-position: center;
        mask-position: center;

        -webkit-mask-size: 100% 100%;
        mask-size: 100% 100%;
      }

      .video-border-layer {
        background: #f6cb99;
        transform: scale(1.1);
        z-index: 1;
      }

      .video-mask-layer {
        transform: scale(1.06);
        z-index: 2;
        overflow: hidden;
      }

      .videoSwiper {
        width: 100%;
        height: 100%;
      }

      .videoSwiper .swiper-wrapper,
      .videoSwiper .swiper-slide {
        width: 100%;
        height: 100%;
      }

      .videoSwiper video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .nav-btn {
        position: absolute;
        top: 47%;
        width: 3vw;
        height: 3vw;
        border-radius: 50%;
        border: 0.18vw solid rgba(255, 255, 255, 0.8);
        background: rgba(255, 255, 255, 0.25);
        color: white;
        font-size: 1vw;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 20;
        cursor: pointer;
        transition: all 0.4s ease;
      }

      .nav-btn i {
        font-size: 1.5vw;
      }
      .prev-btn {
        left: 21vw;
      }

      .next-btn {
        right: 21vw;
      }

      .nav-btn .double-arrow {
        display: none;
      }

      .nav-btn:hover {
        background: white;
        color: gray;
      }

      .nav-btn:hover .single-arrow {
        display: none;
      }

      .nav-btn:hover .double-arrow {
        display: block;
      }

      .content-text {
        position: absolute;
        left: 50%;
        bottom: 2vw;
        width: auto;
        min-width: 10vw;
        max-width: 30vw;
        border: 0.3vw solid #f6cb99;
        border-radius: 1vw;
        height: 6vw;
        transform: translateX(-50%);
        z-index: 10;
        text-align: center;
        transition: width 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 1vw;
        background-color: rgba(245, 40, 146, 48%);
        backdrop-filter: blur(1vw);
        -webkit-backdrop-filter: blur(1vw);
      }

      .textSwiper {
        width: 100%;
        height: 100%;
      }

      .textSwiper .swiper-slide {
        width: fit-content;
        height: 100%;
        opacity: 0 !important;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .textSwiper .swiper-slide-active {
        opacity: 1 !important;
      }

      .content-text p {
        margin: 0;
        font-size: 2vw;
        line-height: 1.3;
        color: white;
        font-family: "BowlbyOne";
        font-weight: 700;
        text-align: center;
        text-shadow: 0.2vw 0.2vw 0.1vw rgba(0, 0, 0, 0.76);
      }

      body[data-lang="hi"] .page-title span,
      body[data-lang="gu"] .page-title span {
        font-size: 2vw;
      }

      body[data-lang="hi"] .content-text p,
      body[data-lang="gu"] .content-text p {
        font-size: 1.8vw;
      }

      .active{
        background-color: #D55B9A;
        color: white;
        border: 0.3vw solid white;
      }

    </style>
  </head>

  <body>
    <a class="home-button home-btn" href="index.html">
      <img src="./assets/images/home-btn.png" alt="" />
    </a>

    <div class="page-title">
      <span data-lang-key="title.1"></span>
    </div>

    <div class="language-container">
      <div class="english active">E</div>
      <div class="hindi">H</div>
      <div class="gujrati">G</div>
    </div>

    <div class="pages">
      <a href="topic-1.html" class="page active" data-lang-key="num-1"></a>
      <a href="topic-2.html" class="page" data-lang-key="num-2"></a>
      <a href="topic-3.html" class="page"   data-lang-key="num-3"></a>
    </div>

    <div class="main">
      <button class="nav-btn prev-btn">
        <i class="fa-solid fa-angle-left single-arrow"></i>
        <i class="fa-solid fa-angles-left double-arrow"></i>
      </button>

      <div class="video-container">
        <img class="dots" src="./assets/images/dots.png" alt="">
        <div class="video-border-layer"></div>

        <div class="video-mask-layer">
          <div class="swiper videoSwiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/topic 3_P1_SP1 V2.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>

              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/topic 3_P1_SP2 v1.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>

              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/topic 3_P1_SP3 v1.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>

              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/4.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>

              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/topic 3_P1_SP5 v2.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>

              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/topic 3_P1_SP6 v1.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>

              <div class="swiper-slide">
                <video
                  src="./assets/videos/topic-1/topic 3_P1_SP7 v1.mp4"
                  muted
                  loop
                  playsinline
                ></video>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="nav-btn next-btn">
        <i class="fa-solid fa-angle-right single-arrow"></i>
        <i class="fa-solid fa-angles-right double-arrow"></i>
      </button>

      <div class="content-text">
        <div class="swiper textSwiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <p data-lang-key="slide-1.1"></p>
            </div>

            <div class="swiper-slide">
              <p data-lang-key="slide-1.2"></p>
            </div>

            <div class="swiper-slide">
              <p data-lang-key="slide-1.3"></p>
            </div>

            <div class="swiper-slide">
              <p data-lang-key="slide-1.4"></p>
            </div>

            <div class="swiper-slide">
              <p data-lang-key="slide-1.5"></p>
            </div>

            <div class="swiper-slide">
              <p data-lang-key="slide-1.6"></p>
            </div>

            <div class="swiper-slide">
              <p data-lang-key="slide-1.7"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      const prevBtn = document.querySelector(".prev-btn");
      const nextBtn = document.querySelector(".next-btn");
      const videos = document.querySelectorAll(".videoSwiper video");

      const videoSwiper = new Swiper(".videoSwiper", {
        speed: 800,
        allowTouchMove: false,
      });

      const textSwiper = new Swiper(".textSwiper", {
        effect: "fade",
        fadeEffect: {
          crossFade: true,
        },
        speed: 700,
        allowTouchMove: false,
      });

      function playCurrentVideo() {
        videos.forEach((video, index) => {
          video.pause();
          video.currentTime = 0;
          if (index === videoSwiper.activeIndex) {
            video.play();
          }
        });
      }

      function updateButtons() {
        prevBtn.style.display = videoSwiper.activeIndex === 0 ? "none" : "flex";
        nextBtn.style.display =
          videoSwiper.activeIndex === videoSwiper.slides.length - 1
            ? "none"
            : "flex";
      }

      function resizeContentBox() {
        const activeSlide = textSwiper.slides[textSwiper.activeIndex];
        const p = activeSlide?.querySelector("p");
        if (!p) return;

        const clone = p.cloneNode(true);
        clone.style.cssText = `
    position: fixed;
    visibility: hidden;
    white-space: nowrap;
    font-size: ${getComputedStyle(p).fontSize};
    font-family: ${getComputedStyle(p).fontFamily};
    font-weight: ${getComputedStyle(p).fontWeight};
    padding: 0;
    margin: 0;
  `;
        document.body.appendChild(clone);
        const textWidth = clone.offsetWidth;
        document.body.removeChild(clone);

        const vwUnit = window.innerWidth / 100;
        const minW = 10 * vwUnit;
        const maxW = 55 * vwUnit;
        const newWidth = Math.min(maxW, Math.max(minW, textWidth + 4 * vwUnit));

        document.querySelector(".content-text").style.width = newWidth + "px";
      }

      nextBtn.addEventListener("click", () => {
        videoSwiper.slideNext();
        textSwiper.slideNext();
      });

      prevBtn.addEventListener("click", () => {
        videoSwiper.slidePrev();
        textSwiper.slidePrev();
      });

      videoSwiper.on("slideChangeTransitionEnd", () => {
        playCurrentVideo();
        updateButtons();
      });

      textSwiper.on("slideChange", () => {
        resizeContentBox();
      });

      textSwiper.on("slideChangeTransitionEnd", () => {
        resizeContentBox();
      });

      window.addEventListener("load", () => {
        playCurrentVideo();
        updateButtons();
        resizeContentBox();
      });

      window.addEventListener("resize", () => {
        resizeContentBox();
      });
    </script>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
